name: Auto Scrape GitHub Data

on:
  schedule:
    # Runs every day at midnight UTC (7 AM WIB)
    - cron: '0 0 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to run it manually from the GitHub website Actions tab

permissions:
  contents: write # Required to push the committed json back to the repository

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run GitHub scraper
        run: node scripts/scrape.js

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/github-data.json
          if git diff --cached --quiet; then
            echo "No changes in GitHub data. Skipping commit."
          else
            git commit -m "chore: auto-update github profile and repos data"
            git push
          fi
